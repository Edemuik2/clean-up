workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.yourdomain.CleanUpApp
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen
      - name: Generate Xcode Project
        script: xcodegen generate
      - name: Build ipa
        script: |
          xcodebuild -project CleanUpApp.xcodeproj \
            -scheme CleanUpApp \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $PWD/build/CleanUpApp.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive
            
          # Упаковка в IPA без подписи (для установки через TrollStore/AltStore)
          # Если есть аккаунт разработчика, Codemagic подпишет автоматически благодаря блоку ios_signing
          mkdir -p $PWD/build/Payload
          cp -r $PWD/build/CleanUpApp.xcarchive/Products/Applications/CleanUpApp.app $PWD/build/Payload/
          cd $PWD/build
          zip -r CleanUpApp.ipa Payload
    artifacts:
      - build/CleanUpApp.ipa